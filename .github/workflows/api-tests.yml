name: Blog tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        tag:
          - smoke
          - regression
          - e2e

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run ${{ matrix.tag }} tests
        run: mvn clean test -Dgroups=${{ matrix.tag }} -Dbase.url=http://localhost:3000 -Dheadless=true
